name: 毎日スクレイピング

on:
  schedule:
    - cron: "0 15 * * *"  # 毎日 00:00 JST（= 15:00 UTC）
  workflow_dispatch:       # 手動実行も可能

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最大6時間

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: |
          pip install playwright pandas beautifulsoup4 lxml
          playwright install chromium
          playwright install-deps chromium

      - name: スクレイピング実行
        run: python scrape_e_uchina.py

      - name: CSVをリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add okinawa_fudosan_companies.csv
          git diff --cached --quiet || git commit -m "自動更新: $(date '+%Y-%m-%d %H:%M JST' -d '+9 hours')"
          git push
